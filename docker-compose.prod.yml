services:
  api:
    command: gunicorn run:app --bind 0.0.0.0:5000 --workers 4 --timeout 120
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
    # sin volumen de código, sin puerto expuesto
    env_file:
      - .env
      - .env.production

  worker:
    env_file:
      - .env
      - .env.production

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file:
      - .env
      - .env.production

  db:
    env_file:
      - .env
      - .env.production