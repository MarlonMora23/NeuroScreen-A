services:
  api:
    build: ./backend
    command: gunicorn run:app --bind 0.0.0.0:5000 --workers 1 --timeout 120
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy     
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - eeg_uploads:/app/uploads
      - ./backend/dl_models:/app/dl_models:ro
    networks:
      - frontend_net
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: "1.5"
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A run.celery worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy     
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_ROLE: worker                  
    volumes:
      - eeg_uploads:/app/uploads
      - ./backend/dl_models:/app/dl_models:ro
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "1"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_BASE: /neuro/
    ports:
      - 9002:8080
    depends_on:
      - api
    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx              
      - /var/run                      
    mem_limit: 256m
    cpus: "0.5"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file:
      - .env
    healthcheck:                       
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data   
    restart: always
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g

volumes:
  postgres_data: null                   
  eeg_uploads: null

networks:
  frontend_net: null
  backend_net: null